name: Log daily sentiment

on:
  schedule:
    # 22:00 UTC daily (~market close for US equities, adjust as you like)
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  log-sentiment:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-log.txt

      - name: Run sentiment logging script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/log_daily_sentiment.py
